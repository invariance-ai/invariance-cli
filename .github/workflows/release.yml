name: Release
# Publishing is disabled until the CLI is ready for public npm release.
# Trigger this workflow manually (workflow_dispatch) with publish=true to
# cut a release once credentials and version policy are finalized.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (must be explicitly set to 'true')"
        required: true
        default: "false"
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  release:
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
